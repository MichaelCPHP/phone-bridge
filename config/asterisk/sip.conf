[general]
context=default
bindaddr=0.0.0.0
bindport=5060
transport=udp

[android-phone]
type=friend
secret=${ASTERISK_SIP_SECRET}
host=dynamic
context=from-phone
qualify=yes

; SECURITY: Set ASTERISK_SIP_SECRET env var before starting Asterisk.
; For local dev: export ASTERISK_SIP_SECRET=your-strong-password
