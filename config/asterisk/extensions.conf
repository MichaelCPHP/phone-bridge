[globals]
; Mac IP where AGI scripts and audio files live
BRIDGE_HOST=192.168.1.235

[default]
; Inbound calls from Android phone → AI handler
exten => _X.,1,NoOp(Inbound call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(agi://192.168.1.235:4573/ai_handler)
 same => n,Hangup()

; Test extension — plays beep (for Linphone connectivity test)
exten => 1234,1,NoOp(Test extension)
 same => n,Answer()
 same => n,Playback(beep)
 same => n,Hangup()

[from-phone]
; Calls from Android SIP client
exten => _X.,1,Goto(default,${EXTEN},1)

; Test
exten => 1234,1,Goto(default,1234,1)
