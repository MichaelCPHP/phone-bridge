;
; PJSIP config for Phone Bridge
; Asterisk 22 — PJSIP only (chan_sip removed)
;

; ── Transport ──────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── Android phone endpoint ─────────────────────────────────────────────────────
; Linphone on Android registers here as "android-phone"
[android-phone]
type=endpoint
context=from-phone
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
auth=android-phone-auth
aors=android-phone
direct_media=no

[android-phone-auth]
type=auth
auth_type=userpass
username=android-phone
; Password set via ASTERISK_SIP_SECRET env var (default: phonebridge123)
password=phonebridge123

[android-phone]
type=aor
max_contacts=1
remove_existing=true
qualify_frequency=30

; ── Inbound calls from any source (fallback) ──────────────────────────────────
[anonymous]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
direct_media=no
